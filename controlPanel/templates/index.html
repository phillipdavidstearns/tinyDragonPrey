<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <meta name="author" content="Control Panel">
    <title>tinyDragonPrey</title>

    <link href="/static/bootstrap.min.css" rel="stylesheet">
    <script src="/static/bootstrap.bundle.min.js"></script>

    <script src="/static/controlPanel.js"></script>

  </head>
  <body>
    <main>
      <div class="containter">
        <div class="row justify-content-center border border-1" id="master-panel">
          <div class="col m-1 pt-3" id="master-settings">
            <p class="text-center h4">Master Settings</p>

            <div class="row align-items-center mb-2 flex-nowrap">
              <div class="col-2 d-flex justify-content-center">
                <button class="btn btn-sm btn-outline-secondary  m-1" id="networks-button">
                  refresh
                </button>
              </div>
              <div class="col-2 d-flex justify-content-center">
                network:
              </div>
              <div class="col d-flex justify-content-center">
                <select class="form-select m-1" id="networks-select">
                  <option value="">click refresh to load available networks</option>
                </select>
              </div>
              <div class="col-1 d-flex justify-content-center">
                <button class="btn btn-sm btn-outline-secondary  m-1" id="targets-button">
                  scan
                </button>
              </div>
            </div>

            <!-- Settings for the Writers // Hidden if state.audio_only is true -->
            <div id="master-print-controls">

              <div class="row align-items-center mb-2 flex-nowrap">
                <div class="col d-flex justify-content-center">
                  <div class="align-items-center form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="master-print-toggle">
                    <label class="form-check-labe" for="master-print-toggle">print</label>
                  </div>
                </div>

                <div class="col d-flex justify-content-center">
                  <div class="align-items-center form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="master-linebreaks-toggle">
                    <label class="form-check-label" for="master-linebreaks-toggle">linebreaks</label>
                  </div>
                </div>

                <div class="col d-flex justify-content-center">
                  <div class="align-items-center form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="master-color-toggle">
                    <label class="form-check-label" for="master-color-toggle">color</label>
                  </div>
                </div>
              </div>

              <div class="row align-items-center mb-2 flex-nowrap">
                <label for="master-color-shift-range" class="col-2 form-label m-1">color shift</label>
                <input type="range" class="col form-range" min="0" max="255" step="1" id="master-color-shift-range" value="0">
                <span class="col-1" id="master-color-shift">0</span>
              </div>

              <div class="row align-items-center mb-2 flex-nowrap">
                <div class="col">
                  <div class="row align-items-center">
                    <label for="master-shift-interval-range" class="col-3 form-label m-1">interval</label>
                    <input type="range" class="col form-range" min="25" max="2500" step="1" id="master-shift-interval-range" value="1000">
                    <span id="master-shift-interval" class="col-2">1000</span>
                  </div>
                </div>

                <div class="col-3">
                  <div class="align-items-center form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="master-shift-interval-toggle">
                    <label class="form-check-label" for="master-shift-interval-toggle">repeat</label>
                  </div>
                </div>
              </div>
            </div>

            <hr>
            <!-- Settings for the Wireless Interfaces -->

            <div class="row align-items-center flex-nowrap">
              <div class="col-3 d-flex justify-content-center">
                <div class="align-items-center form-check form-switch">
                  <input class="form-check-input" type="checkbox" id="master-monitor-toggle">
                  <label class="form-check-label" for="master-monitor-toggle">monitor</label>
                </div>
              </div>
              <div class="col">
                <div class="row align-items-center">
                  <label for="master-channel-range" class="col-2 form-label m-1">channel</label>
                  <input type="range" class="col form-range" min="1" max="13" step="1" id="master-channel-range" value="1">
                  <span id="master-channel" class="col-1">1</span>
                </div>
              </div>
            </div>

            <div class="row align-items-center mb-2 flex-nowrap">
              <div class="col">
                <div class="row align-items-center">
                  <label for="master-channel-interval-range" class="col-3 form-label m-1">interval</label>
                  <input type="range" class="col form-range" min="25" max="2500" step="1" id="master-channel-interval-range" value="1000">
                  <span id="master-channel-interval" class="col-2">1000</span>
                </div>
              </div>
              <div class="col-3">
                <div class="align-items-center form-check form-switch">
                  <input class="form-check-input" type="checkbox" id="master-channel-interval-toggle">
                  <label class="form-check-label" for="master-channel-interval-toggle">repeat</label>
                </div>
              </div>
            </div>
          </div>

          <div class="col m-1 pt-3 border-1 border-start border-end" id="master-message">
            <p class="text-center h4">Master Message</p>

            <div class="row align-items-center mb-2 flex-nowrap">
              <div class="col d-flex justify-content-center">
                <textarea class="form-control" rows="3" name="message" id="master-message-content" placeholder="Send a message."></textarea>
              </div>
            </div>

            <div class="row align-items-center mb-2 flex-nowrap">
              <div class="col d-flex justify-content-center">
                <button class="btn btn-sm btn-outline-secondary" id="master-message-button">send</button>
              </div>
            </div>
            
            <div class="row align-items-center mb-2 flex-nowrap">
              <div class="col">
                <div class="row align-items-center">
                  <label for="master-message-interval-range" class="col-3 form-label m-1">interval</label>
                  <input type="range" class="col form-range" min="50" max="2500" step="1" id="master-message-interval-range" value="1000">
                  <span id="master-message-interval" class="col-2">1000</span>
                </div>
              </div>
              <div class="col-3">
                <div class="align-items-center form-check form-switch">
                  <input class="form-check-input" type="checkbox" id="master-message-interval-toggle">
                  <label class="form-check-label" for="master-message-interval-toggle">repeat</label>
                </div>
              </div>
            </div>

            <div class="row align-items-center mb-2 flex-nowrap">
              <div class="col">
                <div class="row align-items-center">
                  <label for="master-message-flood-delay-range" class="col-3 form-label m-1">delay</label>
                  <input type="range" class="col form-range" min="0.0" max="1.0" step="0.001" id="master-message-flood-delay-range" value="1.000">
                  <span id="master-message-flood-delay" class="col-2">1.000</span>
                </div>
              </div>
              <div class="col">
                <div class="row align-items-center">
                  <label for="master-message-flood-count-range" class="col-3 form-label m-1">count</label>
                  <input type="range" class="col form-range" min="1" max="100" id="master-message-flood-count-range" value="10">
                  <span id="master-message-flood-count" class="col-2">10</span>
                </div>
              </div>
            </div>

            <div class="row align-items-center mb-2 flex-nowrap">
              <div class="col d-flex justify-content-center">
                <button class="btn btn-sm btn-outline-secondary m-1" id="master-message-flood-button">flood</button>
              </div>
            </div>
          </div>

          <div class="col m-1 pt-3" id="master-tone">
            <p class="text-center h4">Master Tone</p> 

            <div class="row align-items-center mb-2 flex-nowrap">
              <div class="col d-flex justify-content-center">
                <select class="form-select" id="master-shape-select" name="master-shape">
                  <option value="sine">sine</option>
                  <option value="tri">tri</option>
                  <option value="square">square</option>
                  <option value="random" selected>random</option>
                  <option value="noise">noise</option>
                </select>
              </div>
            </div>

            <div class="row align-items-center mb-2 flex-nowrap">
              <div class="col">
                <div class="row align-items-center">
                  <label for="master-frequency-range" class="col-3 form-label m-1">frequency</label>
                  <input type="range" class="col form-range" min="10" max="10000" id="master-frequency-range" value="1000">
                </div>
              </div>
              <div class="col-3">
                <input class="form-control m-1" type="number" min="10" max="10000" id="master-frequency" value=1000>
              </div>
            </div>

            <div class="row align-items-center mb-2 flex-nowrap">
              <div class="col">
                <div class="row align-items-center">
                  <label for="master-duration-range" class="col-3 form-label m-1">duration</label>
                  <input type="range" class="col form-range" min="2" max="8164" id="master-duration-range" value="500">
                </div>
              </div>
              <div class="col-3">
                <input class="form-control m-1" type="number" min="2" max="8164" id="master-duration" value=1000>
              </div>
            </div>

            <div class="row align-items-center mb-2 flex-nowrap">
              <div class="col">
                <div class="row align-items-center">
                  <label for="master-tone-interval-range" class="col-3 form-label m-1">interval</label>
                  <input type="range" class="col form-range" min="50" max="2500" step="1" id="master-tone-interval-range" value="1000">
                </div>
              </div>
              <div class="col-3">
                <input class="form-control m-1" type="number" min="50" max="2500" id="master-tone-interval" value=1000>
              </div>
              <div class="col-3">
                <div class="align-items-center form-check form-switch">
                  <input class="form-check-input" type="checkbox" id="master-tone-interval-toggle">
                  <label class="form-check-label" for="master-tone-interval-toggle">repeat</label>
                </div>
              </div>
            </div>

            <div class="row align-items-center mb-2 flex-nowrap">
              <div class="col d-flex justify-content-center">
                <button class="btn btn-sm btn-outline-secondary" id="master-tone-button">beep</button>
              </div>
            </div>
            <hr>
            <div class="row align-items-center mb-2 flex-nowrap">
              <div class="col d-flex justify-content-end">
                <select class="form-select" id="master-scan-mode-select" name="master-scan-mode">
                  <option value="-sS">-sS</option>
                  <option value="-sT" selected>-sT</option>
                  <option value="-sA">-sA</option>
                  <option value="-sX">-sX</option>
                </select>
              </div>
              <div class="col d-flex justify-content-center">
                <div class="row align-items-center flex-nowrap">
                  <div class="col">
                    <div class="form-check">
                      <input class="form-check-input m-1" type="checkbox" id="master-scan-option-sy">
                      <label class="form-check-label m-1" for="master-scan-option-sy">
                        sY
                      </label>
                    </div>
                  </div>
                  <div class="col">
                    <div class="form-check">
                      <input class="form-check-input m-1" type="checkbox" id="master-scan-option-sz">
                      <label class="form-check-label m-1" for="master-scan-option-sz">
                        sZ
                      </label>
                    </div>
                  </div>
                  <div class="col">
                    <div class="form-check">
                      <input class="form-check-input m-1" type="checkbox" id="master-scan-option-sv">
                      <label class="form-check-label m-1" for="master-scan-option-sv">
                        sV
                      </label>
                    </div>
                  </div>
                  <div class="col">
                    <div class="form-check">
                      <input class="form-check-input m-1" type="checkbox" id="master-scan-option-sc">
                      <label class="form-check-label m-1" for="master-scan-option-sc">
                        sC
                      </label>
                    </div>
                  </div>
                  <div class="col">
                    <div class="form-check">
                      <input class="form-check-input m-1" type="checkbox" id="master-scan-option-o">
                      <label class="form-check-label m-1" for="master-scan-option-o">
                        O
                      </label>
                    </div>
                  </div>
                </div>
              </div>
              <div class="col d-flex justify-content-center">
                <button class="btn btn-sm btn-outline-secondary" id="master-nmap-button">nmap</button>
              </div>
            </div>
          </div>
        </div>
        <div class="row justify-content-center gx-0 m-1" id="target-panels">
        </div>
      </div>
    </main>
  </body>
</html>
